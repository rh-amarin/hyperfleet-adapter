# Simple valid HyperFleet Adapter Configuration for testing

apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterConfig
metadata:
  name: example-adapter
  namespace: hyperfleet-system
  labels:
    hyperfleet.io/adapter-type: example
    hyperfleet.io/component: adapter

spec:
  adapter:
    version: "0.1.0"
  
  hyperfleetApi:
    timeout: 2s
    retryAttempts: 3
    retryBackoff: exponential

  kubernetes:
    apiVersion: "v1"

  # Parameters with all required variables
  params:
    - name: "hyperfleetApiBaseUrl"
      source: "env.HYPERFLEET_API_BASE_URL"
      type: "string"
      required: true

    - name: "hyperfleetApiVersion"
      source: "env.HYPERFLEET_API_VERSION"
      type: "string"
      default: "v1"

    - name: "clusterId"
      source: "event.id"
      type: "string"
      required: true

    - name: "generation"
      source: "event.generation"
      type: "string"
      required: true

  # Preconditions with valid operators and CEL expressions
  preconditions:
    - name: "clusterStatus"
      apiCall:
        method: "GET"
        url: "{{ .hyperfleetApiBaseUrl }}/api/hyperfleet/{{ .hyperfleetApiVersion }}/clusters/{{ .clusterId }}"
        timeout: 10s
        retryAttempts: 3
        retryBackoff: "exponential"
      capture:
        - name: "clusterName"
          field: "name"
        - name: "readyConditionStatus"
          expression: |
            status.conditions.filter(c, c.type == "Ready").size() > 0
              ? status.conditions.filter(c, c.type == "Ready")[0].status
              : "False"
        - name: "region"
          field: "spec.region"
        - name: "cloudProvider"
          field: "spec.provider"
        - name: "vpcId"
          field: "spec.vpc_id"
      # Structured conditions with valid operators
      conditions:
        - field: "readyConditionStatus"
          operator: "equals"
          value: "False"

    - name: "validationCheck"
      # Valid CEL expression
      expression: |
        readyConditionStatus == "False"

  # Resources with valid K8s manifests
  resources:
    - name: "clusterNamespace"
      manifest:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: "cluster-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/cluster-name: "{{ .clusterName }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
      discovery:
        namespace: "*"  # Cluster-scoped resource (Namespace)
        bySelectors:
          labelSelector:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/cluster-name: "{{ .clusterName }}"

    - name: "clusterConfigMap"
      manifest:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "cluster-config-{{ .clusterId }}"
          namespace: "cluster-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
      discovery:
        namespace: "cluster-{{ .clusterId }}"
        byName: "cluster-config-{{ .clusterId }}"

    - name: "externalTemplate"
      manifest:
        ref: "/etc/adapter/deployment.yaml"
      discovery:
        namespace: "cluster-{{ .clusterId }}"
        bySelectors:
          labelSelector:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"

  # Post-processing with valid CEL expressions
  post:
    payloads:
      - name: "clusterStatusPayload"
        build:
          adapter: "{{ .metadata.name }}"
          conditions:
            - type: "Applied"
              status:
                expression: |
                  resources.clusterNamespace.status.phase == "Active" ? "True" : "False"
              reason:
                expression: |
                  has(resources.clusterNamespace.status.phase) ? "ResourcesCreated" : "Pending"
              message:
                expression: |
                  "Namespace status: " + resources.clusterNamespace.status.phase

            - type: "Available"
              status:
                expression: |
                  resources.clusterConfigMap != null ? "True" : "False"
              reason:
                expression: |
                  "ConfigMapReady"
              message:
                expression: |
                  "ConfigMap is available"

            - type: "Health"
              status:
                expression: |
                  "True"
              reason:
                expression: |
                  "Healthy"
              message:
                expression: |
                  "All health checks passed"

          data:
            clusterReady:
              expression: |
                resources.clusterNamespace.status.phase == "Active"
              description: "Cluster namespace is active"

          observed_generation:
            value: "{{ .generation }}"
            description: "Resource ID processed"

          lastUpdated:
            value: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"
            description: "Timestamp of status update"

    postActions:
      - name: "reportClusterStatus"
        apiCall:
          method: "POST"
          url: "{{ .hyperfleetApiBaseUrl }}/api/hyperfleet/{{ .hyperfleetApiVersion }}/clusters/{{ .clusterId }}/statuses"
          headers:
            - name: "Content-Type"
              value: "application/json"
          body: "{{ .clusterStatusPayload }}"
